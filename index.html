<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! 💖🎂</title>
    <style>
        /* Smooth Background Animation */
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            100% {background-position: 100% 50%;}
        }

        body {
            min-height: 100vh; /* Ensures full screen fit */
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 8s infinite alternate;
            color: white;
            overflow: hidden;
        }

        /* 3D Glowing Text */
        h1 {
            font-size: 50px;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff69b4, 0 0 30px #ff1493;
            animation: floatText 2s infinite alternate ease-in-out;
        }

        @keyframes floatText {
            0% {transform: translateY(0);}
            100% {transform: translateY(-10px);}
        }

        /* Animated Birth Date */
        .birth-date {
            font-size: 28px;
            font-weight: bold;
            color: #1e90ff;
            text-shadow: 0 0 10px #00bfff, 0 0 20px #1e90ff, 0 0 30px #00bfff;
            animation: glowText 2s infinite alternate ease-in-out;
        }

        @keyframes glowText {
            0% {text-shadow: 0 0 10px #00bfff, 0 0 20px #1e90ff, 0 0 30px #00bfff;}
            100% {text-shadow: 0 0 20px #1e90ff, 0 0 30px #00bfff, 0 0 40px #1e90ff;}
        }

        /* Responsive Photo Gallery */
        .gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .gallery img {
            width: 250px;
            height: auto;
            max-width: 90%;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            transition: transform 0.5s, box-shadow 0.5s;
        }

        .gallery img:hover {
            transform: rotateY(20deg) rotateX(10deg) scale(1.1);
            box-shadow: 0 0 30px white, 0 0 40px blue;
        }

        /* Floating Hearts */
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .heart {
            position: absolute;
            bottom: -10px;
            width: 30px;
            height: 30px;
            transform: rotate(-45deg);
            animation: floatUp 6s infinite;
        }

        /* Perfect Heart Shape */
        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: inherit;
            border-radius: 50%;
        }

        .heart::before {
            top: -15px;
            left: 0;
        }

        .heart::after {
            left: 15px;
            top: 0;
        }

        @keyframes floatUp {
            0% {transform: translateY(0) scale(1); opacity: 1;}
            100% {transform: translateY(-100vh) scale(1.5); opacity: 0;}
        }
    </style>
</head>
<body>
    <h1>💖 Happy Birthday Amma! 🎉🎂❤️</h1>
    <p class="birth-date">Born on March 27 🌟</p>
    <p>Your son is always there for you—stay happy, stay blessed, and keep smiling always... ❤️🎉 💖✨</p>

    <div class="gallery">
        <img src="1.jpg" alt="Mom Photo 1">
        <img src="2.jpg" alt="Mom Photo 2">
        <img src="3.jpg" alt="Mom Photo 3">
    </div>

    <div class="hearts"></div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 3 + "s";

            let colors = ["#ff1493", "#1e90ff", "#ff0000"]; // Pink, Blue, Red
            let randomColor = colors[Math.floor(Math.random() * colors.length)];
            heart.style.backgroundColor = randomColor;
            heart.style.filter = `drop-shadow(0 0 15px ${randomColor})`;

            document.querySelector('.hearts').appendChild(heart);
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 150);
    </script>
</body>
</html>
