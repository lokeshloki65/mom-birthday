<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! 💖🎂</title>
    <style>
        /* Background Animation with Dynamic Colors */
        @keyframes gradientBG {
            0% {background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);}
            25% {background: linear-gradient(45deg, #ff6b6b, #f8e2a1, #fad0c4, #a1c4fd);}
            50% {background: linear-gradient(45deg, #ff758c, #ff7eb3, #a18cd1, #5ee7df);}
            75% {background: linear-gradient(45deg, #fbc2eb, #a1c4fd, #6a11cb, #ff9a9e);}
            100% {background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);}
        }

        body {
            background-size: 400% 400%;
            animation: gradientBG 10s infinite alternate ease-in-out;
            text-align: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 3D Glowing Text */
        h1 {
            font-size: 55px;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff69b4, 0 0 30px #ff1493;
            animation: floatText 2s infinite alternate ease-in-out;
        }

        @keyframes floatText {
            0% {transform: translateY(0);}
            100% {transform: translateY(-10px);}
        }

        /* Animated Birth Date */
        .birth-date {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #00bfff, 0 0 20px #1e90ff, 0 0 30px #4682b4;
            animation: glowText 2s infinite alternate ease-in-out, floatText 2s infinite alternate ease-in-out;
        }

        /* Scrolling Text (lokesh_loki) */
        .scroll-text {
            font-size: 30px;
            font-weight: bold;
            color: rgb(182, 23, 23);
            text-shadow: 0 0 10px rgb(255, 111, 0), 0 0 20px orange, 0 0 30px red;
            position: absolute;
            bottom: 10%;
            white-space: nowrap;
            animation: scrollText 8s linear infinite, flashText 1s infinite alternate;
            display: none; /* Initially hidden */
        }

        @keyframes scrollText {
            0% {left: -100%;}
            100% {left: 100%;}
        }

        @keyframes flashText {
            0% {opacity: 1;}
            100% {opacity: 0.5;}
        }

        p {
            font-size: 22px;
            text-shadow: 0 0 10px pink;
        }

        /* Photo Gallery (Responsive) */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            animation: slideUp 2s;
            flex-wrap: wrap;
        }

        .gallery img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            transition: transform 0.5s, box-shadow 0.5s;
        }

        .gallery img:hover {
            transform: rotateY(20deg) rotateX(10deg) scale(1.1);
            box-shadow: 0 0 30px white, 0 0 40px pink;
        }

        /* Floating Hearts */
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -10px;
            width: 30px;
            height: 30px;
            background-color: red;
            transform: rotate(-45deg);
            animation: floatUp 6s infinite;
            filter: drop-shadow(0 0 15px red);
        }

        /* Perfect Heart Shape */
        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: inherit;
            border-radius: 50%;
        }

        .heart::before {
            top: -15px;
            left: 0;
        }

        .heart::after {
            left: 15px;
            top: 0;
        }

        @keyframes floatUp {
            0% {transform: translateY(0) scale(1); opacity: 1;}
            100% {transform: translateY(-100vh) scale(1.5); opacity: 0;}
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 40px;
            }
            .birth-date {
                font-size: 24px;
            }
            p {
                font-size: 18px;
            }
            .gallery img {
                max-width: 90%;
            }
            .scroll-text {
                font-size: 24px;
            }
        }

    </style>
</head>
<body>
    <h1>💖 Happy Birthday Amma! 🎉🎂❤️</h1>
    <p class="birth-date">Born on March 27 🌟</p>
    <p>Your son is always there for you—stay happy, stay blessed, and keep smiling always... ❤️🎉 💖✨</p>

    <div class="gallery">
        <img src="1.jpg" alt="Mom Photo 1">
        <img src="2.jpg" alt="Mom Photo 2">
        <img src="3.jpg" alt="Mom Photo 3">
    </div>

    <div class="hearts"></div>

    <!-- Scrolling Text -->
    <div class="scroll-text" id="scrollText"> Lokesh_Loki </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 3 + "s";

            let colors = ["#ff1493", "#1e90ff", "#ff4500", "#32cd32", "#ff69b4"];
            let randomColor = colors[Math.floor(Math.random() * colors.length)];
            heart.style.backgroundColor = randomColor;
            heart.style.filter = `drop-shadow(0 0 10px ${randomColor})`;

            document.querySelector('.hearts').appendChild(heart);
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 150);

        // Show scrolling text after 10 seconds
        setTimeout(() => {
            document.getElementById("scrollText").style.display = "block";
        }, 50);
    </script>
</body>
</html>
